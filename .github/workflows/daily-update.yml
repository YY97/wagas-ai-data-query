name: Wagas 每日数据更新

on:
  schedule:
    # 北京时间每天 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Node.js & guancli
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g @guandata/guancli

      - name: 配置 guancli & 环境变量
        run: |
          # 设置 GUANCLI_JS 让 Python 脚本能找到 run.js
          export GUANCLI_JS=$(npm root -g)/@guandata/guancli/bin/run.js
          echo "GUANCLI_JS=$GUANCLI_JS" >> $GITHUB_ENV
          # 写配置文件
          mkdir -p ~/.guancli
          cat > ~/.guancli/config.json << 'EOF'
          {
            "profiles": {
              "wagas": {
                "name": "wagas",
                "base_url": "https://bi.wagas.com.cn",
                "domain": "wagas",
                "login_id": "${{ secrets.GUANCLI_USER }}",
                "password": "${{ secrets.GUANCLI_PASS }}",
                "auth_method": "password"
              }
            }
          }
          EOF

      - name: 拉取昨天销售数据
        id: sales
        run: python etl_pull_data.py --days 1 --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 刷新外卖配送点
        id: delivery
        run: python etl_delivery_heatmap.py 30
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 生成地图
        run: python gen_coverage_v4.py
        working-directory: ${{ github.workspace }}

      - name: 拷贝文件到发布目录
        run: |
          cp wagas_stores_coverage_v4.html store-network/index.html
          cp output/delivery_points_compact.json store-network/delivery_points_compact.json

      - name: 提交并推送到 GitHub
        run: |
          git config user.name "Wagas Bot"
          git config user.email "bot@wagas.com"
          git add store-network/index.html store-network/delivery_points_compact.json output/
          git diff --staged --quiet || (git commit -m "Daily update $(date +%Y-%m-%d)" && git push)
