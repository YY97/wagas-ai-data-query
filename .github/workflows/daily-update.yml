name: Wagas 每日数据更新

on:
  schedule:
    # 北京时间每天 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Node.js & guancli
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g @guandata/guancli

      - name: 配置 guancli & 环境变量
        shell: powershell
        run: |
          $npmRoot = (npm root -g).Trim()
          $guancliJs = "$npmRoot\@guandata\guancli\bin\run.js"
          echo "GUANCLI_JS=$guancliJs" >> $env:GITHUB_ENV
          echo "AMAP_KEY=${{ secrets.AMAP_KEY }}" >> $env:GITHUB_ENV
          $configDir = "$env:APPDATA\guancli"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          $configJson = '{"profiles":{"wagas":{"name":"wagas","base_url":"https://bi.wagas.com.cn","domain":"wagas","login_id":"${{ secrets.GUANCLI_USER }}","password":"${{ secrets.GUANCLI_PASS }}","auth_method":"password"}}}'
          [IO.File]::WriteAllText("$configDir\config.json", $configJson)

      - name: 登录 guancli 获取 token
        shell: powershell
        run: |
          $env:GUANCLI_JS = (npm root -g).Trim() + "\@guandata\guancli\bin\run.js"
          node $env:GUANCLI_JS auth login --profile wagas --login-id "${{ secrets.GUANCLI_USER }}" --password "${{ secrets.GUANCLI_PASS }}" --save-password
          Write-Host "guancli login completed"
        continue-on-error: false

      # ===== 每日 ETL =====
      - name: 拉取销售数据（近2天增量）
        id: sales
        run: python etl_pull_data.py --days 2 --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 刷新外卖配送点（近30天）
        id: delivery
        run: python etl_delivery_heatmap.py 30
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ===== 月度/季度 ETL =====
      - name: 更新商圈环境数据（季度月1号运行）
        id: market
        shell: powershell
        run: |
          $month = (Get-Date).Month
          $day = (Get-Date).Day
          $isQuarterly = ($month -eq 1 -or $month -eq 4 -or $month -eq 7 -or $month -eq 10) -and ($day -eq 1)
          if (-not $isQuarterly -and '${{ github.event_name }}' -ne 'workflow_dispatch') {
            Write-Host "Skipping market ETL (quarterly only: Jan/Apr/Jul/Oct 1st)"
            exit 0
          }
          python etl_market_context.py --key ${{ secrets.AMAP_KEY }} --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 更新热门配送地 TOP10（每月1号运行）
        id: toploc
        shell: powershell
        run: |
          $day = (Get-Date).Day
          if ($day -ne 1 -and '${{ github.event_name }}' -ne 'workflow_dispatch') {
            Write-Host "Skipping top locations ETL (monthly, only runs on 1st)"
            exit 0
          }
          python etl_delivery_top_locations.py --key ${{ secrets.AMAP_KEY }} --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ===== 新版 React 地图数据同步 =====
      - name: 每日同步数据
        id: v2sync
        run: python daily_sync.py
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 构建 React 应用
        run: |
          cd store-network-v2
          npm ci --silent
          npx vite build
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 部署到 store-network 目录
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path store-network/assets | Out-Null
          New-Item -ItemType Directory -Force -Path store-network/data/delivery | Out-Null
          if (Test-Path store-network-v2/dist/index.html) {
            Copy-Item -Force store-network-v2/dist/index.html store-network/index.html
            Copy-Item -Force store-network-v2/dist/assets/* store-network/assets/
            Copy-Item -Force store-network-v2/public/favicon.svg store-network/
            Copy-Item -Force store-network-v2/public/icons.svg store-network/
            Remove-Item -Recurse -Force store-network-v2/dist
            Write-Host "Build deployed"
          }
          # 复制数据文件
          if (Test-Path store-network-v2/public/data/stores.json) {
            Copy-Item -Force store-network-v2/public/data/*.json store-network/data/
            Copy-Item -Force -Recurse store-network-v2/public/data/delivery/* store-network/data/delivery/
            Write-Host "Data files copied"
          }
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ===== 提交推送 =====
      - name: 提交并推送到 GitHub
        shell: powershell
        run: |
          git config user.name "Wagas Bot"
          git config user.email "bot@wagas.com"
          git add store-network/ store-network-v2/data/ store-network-v2/public/data/ output/
          $hasChanges = git diff --staged --quiet 2>&1
          if ($LASTEXITCODE -ne 0) {
            $today = Get-Date -Format "yyyy-MM-dd"
            git commit -m "Daily update $today"
            git push
            Write-Host "Committed and pushed"
          } else {
            Write-Host "No changes to commit"
          }
        working-directory: ${{ github.workspace }}
        continue-on-error: true
