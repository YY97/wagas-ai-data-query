name: Wagas 每日数据更新

on:
  schedule:
    # 北京时间每天 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 拉取昨天销售数据
        id: sales
        run: python etl_pull_data.py --days 1 --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 刷新外卖配送点
        id: delivery
        run: python etl_delivery_heatmap.py 30
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 生成地图
        run: python gen_coverage_v4.py
        working-directory: ${{ github.workspace }}

      - name: 拷贝文件到发布目录
        shell: pwsh
        run: |
          Copy-Item -Force wagas_stores_coverage_v4.html store-network/index.html
          Copy-Item -Force output/delivery_points_compact.json store-network/delivery_points_compact.json
        working-directory: ${{ github.workspace }}

      - name: 提交并推送到 GitHub
        shell: bash
        run: |
          git config user.name "Wagas Bot"
          git config user.email "bot@wagas.com"
          git add store-network/index.html store-network/delivery_points_compact.json output/
          git diff --staged --quiet || (git commit -m "Daily update $(date +%Y-%m-%d)" && git push)
        working-directory: ${{ github.workspace }}
