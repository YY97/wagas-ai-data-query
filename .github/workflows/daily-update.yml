name: Wagas 每日数据更新

on:
  schedule:
    # 北京时间每天 7:00（UTC 23:00）和 8:00（UTC 0:00），双保险防止跳过
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write  # 数据断档时自动开 Issue 告警

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Node.js & guancli
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g @guandata/guancli

      - name: 配置 guancli & 环境变量
        run: |
          GUANCLI_JS="$(npm root -g)/@guandata/guancli/bin/run.js"
          echo "GUANCLI_JS=$GUANCLI_JS" >> $GITHUB_ENV
          echo "AMAP_KEY=${{ secrets.AMAP_KEY }}" >> $GITHUB_ENV
          CONFIG_DIR="$HOME/.config/guancli"
          mkdir -p "$CONFIG_DIR"
          # 先写模板（占位符），再 sed 替换，避免密码特殊字符破坏 JSON
          echo '{"profiles":{"wagas":{"name":"wagas","base_url":"https://bi.wagas.com.cn","domain":"wagas","login_id":"__USER__","password":"__PASS__","auth_method":"password"}}}' > "$CONFIG_DIR/config.json"
          sed -i "s|__USER__|${{ secrets.GUANCLI_USER }}|g" "$CONFIG_DIR/config.json"
          sed -i "s|__PASS__|${{ secrets.GUANCLI_PASS }}|g" "$CONFIG_DIR/config.json"
          echo "guancli config written"
          python3 -c "import json; json.load(open('$CONFIG_DIR/config.json')); print('JSON valid')"

      - name: 登录 guancli 获取 token
        run: |
          GUANCLI_JS="$(npm root -g)/@guandata/guancli/bin/run.js"
          node "$GUANCLI_JS" auth login --profile wagas --login-id "${{ secrets.GUANCLI_USER }}" --password "${{ secrets.GUANCLI_PASS }}" --save-password
          echo "guancli login completed"
        continue-on-error: false

      # ===== 每日 ETL =====
      - name: 拉取销售数据（近2天增量）
        id: sales
        run: python etl_pull_data.py --days 2 --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 更新渠道销售拆分（近2天增量）
        id: channel
        run: python etl_channel_sales.py 2 --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 刷新外卖配送点（近30天）
        id: delivery
        run: python etl_delivery_heatmap.py 30
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ===== 月度/季度 ETL =====
      - name: 更新商圈环境数据（季度月1号运行）
        id: market
        run: |
          MONTH=$(date +%m)
          DAY=$(date +%d)
          if { [ "$MONTH" = "01" ] || [ "$MONTH" = "04" ] || [ "$MONTH" = "07" ] || [ "$MONTH" = "10" ]; } && [ "$DAY" = "01" ]; then
            python etl_market_context.py --key ${{ secrets.AMAP_KEY }} --output-dir ./output
          else
            echo "Skipping market ETL (today=${MONTH}-${DAY}, only runs 1st of Jan/Apr/Jul/Oct)"
          fi
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 更新热门配送地 TOP10（每月1号运行）
        id: toploc
        run: |
          DAY=$(date +%d)
          if [ "$DAY" = "01" ]; then
            python etl_delivery_top_locations.py --key ${{ secrets.AMAP_KEY }} --output-dir ./output
          else
            echo "Skipping top locations ETL (today=$DAY, only runs on 1st)"
          fi
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 更新竞品门店（每月1号运行）
        id: competitor
        run: |
          DAY=$(date +%d)
          if [ "$DAY" = "01" ]; then
            python etl_competitor_stores.py --key ${{ secrets.AMAP_KEY }} --output-dir ./output
          else
            echo "Skipping competitor ETL (today=$DAY, only runs on 1st)"
          fi
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ===== 新版 React 地图数据同步 =====
      - name: 每日同步数据
        id: v2sync
        run: python daily_sync.py
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 构建 React 应用
        run: |
          cd store-network-v2
          npm ci --silent
          npx vite build
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 部署到 store-network 目录
        run: |
          mkdir -p store-network/data/delivery
          if [ -f store-network-v2/dist/index.html ]; then
            rm -rf store-network/assets
            mkdir -p store-network/assets
            cp -f store-network-v2/dist/index.html store-network/index.html
            cp -f store-network-v2/dist/assets/* store-network/assets/
            cp -f store-network-v2/public/favicon.svg store-network/
            cp -f store-network-v2/public/icons.svg store-network/
            rm -rf store-network-v2/dist
            echo "Build deployed (old assets cleaned)"
          fi
          if [ -f store-network-v2/public/data/stores.json ]; then
            cp -f store-network-v2/public/data/*.json store-network/data/
            cp -rf store-network-v2/public/data/delivery/* store-network/data/delivery/
            echo "Data files copied"
          fi
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ===== 提交推送（先提交 git 备份，再部署 OSS，OSS 故障不影响数据入库）=====
      - name: 提交并推送到 GitHub
        run: |
          git config user.name "Wagas Bot"
          git config user.email "bot@wagas.com"
          git add store-network/ store-network-v2/data/ store-network-v2/public/data/ output/
          if ! git diff --staged --quiet; then
            TODAY=$(date +%Y-%m-%d)
            git commit -m "Daily update $TODAY"
            git push
            echo "Committed and pushed"
          else
            echo "No changes to commit"
          fi
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      # ===== 部署到阿里云 OSS =====
      - name: 配置 ossutil
        uses: manyuanrong/setup-ossutil@v3.0
        with:
          endpoint: ${{ secrets.ALIBABA_CLOUD_ENDPOINT }}
          access-key-id: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}

      - name: 部署到阿里云 OSS
        run: |
          BUCKET="oss://${{ secrets.ALIBABA_CLOUD_BUCKET }}"
          # index.html 和数据文件：不缓存，数据更新后用户刷新即生效
          ossutil cp store-network/index.html $BUCKET/index.html --force --meta Cache-Control:no-cache
          ossutil cp -r store-network/data/ $BUCKET/data/ --force --meta Cache-Control:no-cache
          ossutil cp store-network/favicon.svg $BUCKET/favicon.svg --force --meta Cache-Control:no-cache
          ossutil cp store-network/icons.svg $BUCKET/icons.svg --force --meta Cache-Control:no-cache
          # 带哈希的 JS/CSS 静态资源：长缓存（文件名变了浏览器自然会重新拉取）
          ossutil cp -r store-network/assets/ $BUCKET/assets/ --force --meta Cache-Control:max-age=31536000
          echo "Deployed to OSS (cache headers set)"
        working-directory: ${{ github.workspace }}

      # ===== 数据新鲜度检查（最后执行，断档自动开 Issue，不阻断流程）=====
      - name: 数据新鲜度检查
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(tail -n +2 output/store_daily_sales.csv | cut -d',' -f1 | sort | tail -1)
          YESTERDAY=$(date -d "yesterday" +%Y-%m-%d)
          echo "CSV 最新日期: $LATEST | 期望: $YESTERDAY"
          if [[ "$LATEST" < "$YESTERDAY" ]]; then
            echo "::warning::销售数据断档：最新 $LATEST，应为 $YESTERDAY"
            OPEN=$(gh issue list --repo ${{ github.repository }} --state open --search "数据更新告警 in:title" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$OPEN" ]; then
              BODY=$(printf '每日 ETL 未拉到最新数据。\n\n- CSV 最新日期: %s\n- 期望日期: %s\n- Workflow: %s\n\n请检查 guancli 登录状态与 BI 可达性。数据恢复后请手动关闭本 Issue。' "$LATEST" "$YESTERDAY" "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
              gh issue create --repo ${{ github.repository }} --title "⚠️ 数据更新告警：销售数据停留在 $LATEST" --body "$BODY"
              echo "已创建告警 Issue"
            else
              echo "已存在告警 Issue #$OPEN，跳过重复创建"
            fi
          else
            echo "数据新鲜，无需告警"
          fi
        working-directory: ${{ github.workspace }}
