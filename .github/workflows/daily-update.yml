name: Wagas 每日数据更新

on:
  schedule:
    # 北京时间每天 9:00 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Node.js & guancli
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g @guandata/guancli

      - name: 配置 guancli & 环境变量
        shell: powershell
        run: |
          $npmRoot = (npm root -g).Trim()
          $guancliJs = "$npmRoot\@guandata\guancli\bin\run.js"
          echo "GUANCLI_JS=$guancliJs" >> $env:GITHUB_ENV
          $configDir = "$env:APPDATA\guancli"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          $configJson = '{"profiles":{"wagas":{"name":"wagas","base_url":"https://bi.wagas.com.cn","domain":"wagas","login_id":"${{ secrets.GUANCLI_USER }}","password":"${{ secrets.GUANCLI_PASS }}","auth_method":"password"}}}'
          [IO.File]::WriteAllText("$configDir\config.json", $configJson)

      - name: 拉取昨天销售数据
        id: sales
        run: python etl_pull_data.py --days 2 --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 刷新外卖配送点
        id: delivery
        run: python etl_delivery_heatmap.py 30
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 更新商圈环境数据
        id: market
        shell: powershell
        run: |
          $day = (Get-Date).DayOfWeek
          if ($day -ne 'Monday' -and '${{ github.event_name }}' -ne 'workflow_dispatch') {
            Write-Host "Skipping market ETL (today is $day, only runs on Monday)"
            exit 0
          }
          python etl_market_context.py --key ${{ secrets.AMAP_KEY }} --output-dir ./output
        working-directory: ${{ github.workspace }}
        continue-on-error: true

      - name: 生成地图
        run: python gen_coverage_v4.py
        working-directory: ${{ github.workspace }}

      - name: 拷贝文件到发布目录
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path store-network | Out-Null
          if (Test-Path wagas_stores_coverage_v4.html) {
            Copy-Item -Force wagas_stores_coverage_v4.html store-network/index.html
            Write-Host "HTML copied"
          } else {
            Write-Host "HTML not generated, skipping"
          }
          if (Test-Path output/delivery_points_compact.json) {
            Copy-Item -Force output/delivery_points_compact.json store-network/delivery_points_compact.json
            Write-Host "Delivery JSON copied"
          } else {
            Write-Host "Delivery JSON not found, skipping"
          }
        working-directory: ${{ github.workspace }}

      - name: 提交并推送到 GitHub
        shell: powershell
        run: |
          git config user.name "Wagas Bot"
          git config user.email "bot@wagas.com"
          git add store-network/index.html store-network/delivery_points_compact.json output/
          $diff = git diff --staged --quiet 2>&1
          if ($LASTEXITCODE -ne 0) {
            $today = Get-Date -Format "yyyy-MM-dd"
            git commit -m "Daily update $today"
            git push
          }
        working-directory: ${{ github.workspace }}
